<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated Financial Ledger & Calculator</title>
    <style>
        :root {
            --bg-color: #e0e3eb;
            --panel-bg: #ffffff;
            --text-main: #000e1a;
            --border-light: #cccccc;
            --btn-give: #ff5722;
            --btn-receive: #8bc34a;
            --btn-neutral: #03a9f4;
            --calc-bg: #2c3e50;
            --calc-key: #eee;
            --calc-key-op: #ff9800;
            --calc-key-action: #e74c3c;
        }
        
        /* Apply box-sizing border-box globally to prevent visual padding spillover */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

     .dashboard-container {
            display: flex;
            gap: 25px;
            max-width: 1400px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

     .left-column {
            flex: 1 1 380px;
            max-width: 485px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

     .right-column {
            flex: 2 1 650px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

     .panel {
            background: var(--panel-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
        }

        h2 {
            margin-top: 0;
            font-size: 1.4rem;
            border-bottom: 2px solid var(--border-light);
            padding-bottom: 12px;
            margin-bottom: 15px;
        }
        
        /* Personal Debit Module Styles */
     .debit-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--btn-give);
            margin: 20px 0;
            text-align: center;
            background-color: #fff3e0;
            border-radius: 8px;
            padding: 10px;
        }

     .input-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        input[type="number"] {
            flex: 1 1 auto;
            padding: 12px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: 1.1rem;
            min-width: 0; /* Critical: allows input to shrink on small containers */
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, opacity 0.2s;
            white-space: nowrap; /* Prevents text from breaking onto multiple lines */
        }

        button:hover { transform: scale(1.02); opacity: 0.9; }
        button:active { transform: scale(0.95); }
     .btn-add { background-color: var(--btn-neutral); flex: 1 1 auto; }
     .btn-reset { background-color: var(--calc-key-action); flex: 0 0 auto; }
        
        /* Peer Ledger Matrix Styles - Perfectly balanced CSS Grid */
     .ledger-row {
            display: grid;
            grid-template-columns: 90px 1.9fr 1.1fr; /* Adjusted to maximize space for inputs & buttons */
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-light);
            gap: 10px;
        }

     .ledger-row:last-child { border-bottom: none; }

     .peer-name {
            font-weight: 600;
            text-transform: capitalize;
            font-size: 0.95rem; /* Slightly reduced name size to maximize button space */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

     .ledger-controls {
            display: flex;
            gap: 6px; /* Reduced gap slightly to prevent horizontal scroll/wrapping */
            align-items: center;
            min-width: 0;
        }

     .ledger-controls input {
            width: 70px; /* Reduced width to leave more space for buttons */
            flex: 0 0 auto;
            padding: 8px 10px;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            font-size: 0.95rem;
        }

     .ledger-controls button {
            flex: 1 1 auto;
            white-space: nowrap;
            padding: 8px 10px;
            font-size: 0.78rem; /* Reduced button font size so full text fits beautifully */
            border-radius: 6px;
        }

     .btn-give { background-color: var(--btn-give); }
     .btn-receive { background-color: var(--btn-receive); }

     .balance-display {
            text-align: right;
            font-weight: bold;
            font-size: 0.85rem; /* Slightly reduced so full phrases like "Avunga kudukanum" fit on one line */
            padding: 8px 12px;
            border-radius: 6px;
            white-space: nowrap; /* Forces text to stay on a single line */
        }
     .balance-positive { color: #2e7d32; background-color: #e8f5e9; }
     .balance-negative { color: #c62828; background-color: #ffebee; }
     .balance-neutral { color: var(--text-main); background-color: #f5f5f5; }

        /* Real-Time Calculator Styles */
     .calculator {
            background-color: var(--calc-bg);
            border-radius: 15px;
            padding: 20px;
        }

     .calculator__display {
            background-color: #ffeb3b;
            color: var(--text-main);
            font-size: 2.2rem;
            text-align: right;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            border: none;
            width: 100%;
        }

     .calculator__keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

     .calculator__keys button {
            background-color: var(--calc-key);
            color: var(--text-main);
            font-size: 1.4rem;
            padding: 18px 0;
            border-radius: 10px;
            font-weight: bold;
        }

     .calculator__keys button[data-action="add"],
     .calculator__keys button[data-action="subtract"],
     .calculator__keys button[data-action="multiply"],
     .calculator__keys button[data-action="divide"] {
            background-color: var(--calc-key-op);
            color: white;
        }

     .calculator__keys button[data-action="calculate"] {
            background-color: var(--btn-receive);
            color: white;
            grid-column: span 2;
        }

     .calculator__keys button[data-action="clear"] {
            background-color: var(--calc-key-action);
            color: white;
            grid-column: span 2;
        }

        /* History Panel Styles */
      .history-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
      .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1 1 auto;
        }
        select {
            padding: 8px;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            font-size: 0.9rem;
            flex: 1;
            min-width: 120px;
            background-color: white;
            color: var(--text-main);
        }
      .history-list {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 10px;
            background-color: #fafafa;
        }
      .history-item {
            border-bottom: 1px dashed #ccc;
            padding: 8px 0;
            font-size: 0.85rem;
        }
      .history-item:last-child { border-bottom: none; }
      .history-meta {
            display: flex;
            justify-content: space-between;
            color: #555;
            margin-bottom: 2px;
        }
      .history-msg { color: #111; font-weight: 500; }
      .btn-clear-log {
            background-color: var(--calc-key-action);
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
        }

        /* Mobile Viewports - Elements stack elegantly */
        @media (max-width: 850px) {
            body {
                padding: 10px;
            }

         .dashboard-container {
                flex-direction: column;
                align-items: stretch;
            }

         .left-column,.right-column {
                max-width: 100%;
                flex: 1 1 auto;
            }

         .ledger-row {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 20px 0;
                border-bottom: 2px solid var(--border-light);
            }

         .peer-name {
                text-align: center;
                font-size: 1.25rem;
                width: 100%;
            }

         .ledger-controls {
                width: 100%;
                gap: 8px;
            }

         .ledger-controls input {
                flex: 1 1 auto;
                width: 100%;
                height: 44px;
            }

         .ledger-controls button {
                height: 44px;
                font-size: 0.95rem; /* Restored mobile readable size as they are stacked */
            }

         .balance-display {
                text-align: center;
                width: 100%;
                font-size: 1.1rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <div class="left-column">
        <div class="panel">
            <h2>Personal Daily Debit Accumulator</h2>
            <div class="debit-display">₹<span id="total-debit-val">0.00</span></div>
            <div class="input-group">
                <input type="number" id="daily-debit-input" placeholder="Enter daily debit..." step="0.01" min="0">
                <button class="btn-add" onclick="addDailyDebit()">Add to Total</button>
                <button class="btn-reset" onclick="resetDailyDebit()">Reset</button>
            </div>
        </div>

        <div class="panel calculator">
            <div class="calculator__display" id="calc-display">0</div>
            <div class="calculator__keys" id="calc-keys">
                <button data-action="clear">AC</button>
                <button data-action="divide">÷</button>
                <button data-action="multiply">×</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button data-action="subtract">-</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button data-action="add">+</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>0</button>
                <button data-action="decimal">.</button>
                <button data-action="calculate">=</button>
            </div>
        </div>

        <div class="panel">
            <h2>Transaction History Log</h2>
            <div class="history-controls">
                <div class="filter-group">
                    <label for="history-filter" style="font-weight: bold; font-size: 0.9rem;">Filter:</label>
                    <select id="history-filter" onchange="renderHistory()">
                        <option value="all">All History</option>
                        <option value="Personal">Personal Debits</option>
                    </select>
                </div>
                <button class="btn-clear-log" onclick="clearHistory()">Clear Log</button>
            </div>
            <div id="history-list" class="history-list"></div>
        </div>
    </div>

    <div class="right-column">
        <div class="panel">
            <h2>Cohort Ledger (Pending Balances)</h2>
            <div id="ledger-container"></div>
        </div>
    </div>

</div>

<script>
    // --- Data Initialization & Lexicographical Sorting ---
    const rawFriendsArray = ["thiwakar", "gojo", "mowlish", "goww", "aravindh", "mohan", "gowtham", "parithi", "soukar"];
    const sortedFriends = rawFriendsArray.sort(); 
    
    // Read saved data from browser cache, or default to 0/empty if none exists
    let personalTotalDebit = parseFloat(localStorage.getItem('personalTotalDebit')) || 0;
    const ledgerState = JSON.parse(localStorage.getItem('ledgerState')) || {};
    let transactionHistory = JSON.parse(localStorage.getItem('transactionHistory')) ||;
    
    // Initialize ledger state to 0 only for new peers who have no saved data
    sortedFriends.forEach(peer => {
        if (ledgerState[peer] === undefined) {
            ledgerState[peer] = 0;
        }
    });

    // Make sure the screen displays your saved daily debit on load
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('total-debit-val').textContent = personalTotalDebit.toFixed(2);
        
        // Setup filter dropdown dynamically
        const filterEl = document.getElementById('history-filter');
        sortedFriends.forEach(peer => {
            const opt = document.createElement('option');
            opt.value = peer;
            opt.textContent = peer.charAt(0).toUpperCase() + peer.slice(1);
            filterEl.appendChild(opt);
        });

        renderLedger(); // Render the ledger with saved data
        renderHistory(); // Render the transaction history logs
    });

    // --- Personal Debit Accumulator Logic ---
    function addDailyDebit() {
        const inputEl = document.getElementById('daily-debit-input');
        const displayEl = document.getElementById('total-debit-val');
        const amount = parseFloat(inputEl.value);
        
        if (!isNaN(amount) && amount > 0) {
            personalTotalDebit += amount;
            displayEl.textContent = personalTotalDebit.toFixed(2);
            localStorage.setItem('personalTotalDebit', personalTotalDebit);
            
            // Log Personal Debit Event
            logTransaction('Personal', `Added ₹${amount.toFixed(2)} to daily accumulator.`);
            
            inputEl.value = '';
        }
    }

    function resetDailyDebit() {
        if (confirm("Are you sure you want to reset your personal daily debit accumulator to ₹0.00?")) {
            personalTotalDebit = 0;
            document.getElementById('total-debit-val').textContent = '0.00';
            localStorage.setItem('personalTotalDebit', 0);
            
            // Log Personal Debit Reset Event
            logTransaction('Personal', `Reset daily accumulator to ₹0.00.`);
        }
    }

    // --- Dynamic Log History Logic ---
    function logTransaction(peer, message) {
        const now = new Date();
        const dateStr = now.toLocaleDateString();
        const timeStr = now.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const timestamp = `${dateStr} ${timeStr}`;
        
        transactionHistory.unshift({ peer, message, timestamp });
        localStorage.setItem('transactionHistory', JSON.stringify(transactionHistory));
        renderHistory();
    }

    function renderHistory() {
        const filterVal = document.getElementById('history-filter').value;
        const listEl = document.getElementById('history-list');
        listEl.innerHTML = '';

        const filtered = transactionHistory.filter(item => {
            if (filterVal === 'all') return true;
            return item.peer === filterVal;
        });

        if (filtered.length === 0) {
            listEl.innerHTML = '<div style="text-align:center;color:#666;padding:15px;font-size:0.9rem;">No transaction logs found.</div>';
            return;
        }

        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <div class="history-meta">
                    <span style="font-weight:bold;text-transform:capitalize;">${item.peer}</span>
                    <span style="font-size:0.75rem;color:#777;">${item.timestamp}</span>
                </div>
                <div class="history-msg">${item.message}</div>
            `;
            listEl.appendChild(div);
        });
    }

    function clearHistory() {
        if (confirm("Are you sure you want to clear your entire transaction history log?")) {
            transactionHistory =;
            localStorage.setItem('transactionHistory', JSON.stringify(transactionHistory));
            renderHistory();
        }
    }

    // --- Dynamic Ledger Rendering Pipeline ---
    function renderLedger() {
        const container = document.getElementById('ledger-container');
        container.innerHTML = ''; // Purge existing DOM nodes

        sortedFriends.forEach(peer => {
            const currentBalance = ledgerState[peer];
            
            // Format balance display text and semantic classes
            let balanceText = 'Settled (₹0)';
            let balanceClass = 'balance-neutral';
            if (currentBalance > 0) {
                balanceText = `Avunga kudukanum ₹${currentBalance.toFixed(2)}`;
                balanceClass = 'balance-positive';
            } else if (currentBalance < 0) {
                balanceText = `Naan Kudukanum ₹${Math.abs(currentBalance).toFixed(2)}`;
                balanceClass = 'balance-negative';
            }

            const row = document.createElement('div');
            row.className = 'ledger-row';
            row.innerHTML = `
                <div class="peer-name">${peer}</div>
                <div class="ledger-controls">
                    <input type="number" id="input-${peer}" placeholder="Amount" step="0.01" min="0">
                    <button class="btn-give" onclick="processTransaction('${peer}', 'give')">Naa kuduthen</button>
                    <button class="btn-receive" onclick="processTransaction('${peer}', 'receive')">Avunga kuduthanga</button>
                </div>
                <div class="balance-display ${balanceClass}">${balanceText}</div>
            `;
            container.appendChild(row);
        });
    }

    function processTransaction(peer, action) {
        const inputEl = document.getElementById(`input-${peer}`);
        const amount = parseFloat(inputEl.value);
        
        if (!isNaN(amount) && amount > 0) {
            let message = '';
            if (action === 'give') {
                // Disbursement increases peer's debt to primary user
                ledgerState[peer] += amount;
                message = `You paid (Naa kuduthen) ₹${amount.toFixed(2)}.`;
            } else if (action === 'receive') {
                // Receipt decreases peer's debt to primary user
                ledgerState[peer] -= amount;
                message = `They paid (Avunga kuduthanga) ₹${amount.toFixed(2)}.`;
            }
            
            // Calculate and append the new ledger state to the logged statement
            const updated = ledgerState[peer];
            const stateSummary = updated === 0? 'Settled' : (updated > 0? `Owes you ₹${updated.toFixed(2)}` : `You owe ₹${Math.abs(updated).toFixed(2)}`);
            message += ` Status: ${stateSummary}.`;
            
            // Log Transaction Event
            logTransaction(peer, message);
            
            inputEl.value = '';
            renderLedger(); // Trigger a DOM repaint pipeline
            localStorage.setItem('ledgerState', JSON.stringify(ledgerState));
        }
    }

    // --- Event Delegation State Machine for Calculator ---
    const calcKeys = document.getElementById('calc-keys');
    const calcDisplay = document.getElementById('calc-display');
    let calcState = {
        firstOperand: null,
        operator: null,
        waitingForSecondOperand: false,
        displayValue: '0'
    };

    function updateCalcDisplay() {
        calcDisplay.textContent = calcState.displayValue;
    }

    calcKeys.addEventListener('click', (event) => {
        const target = event.target;
        if (!target.matches('button')) return;

        const action = target.dataset.action;
        const keyContent = target.textContent;

        if (!action) {
            // Numerical Input Handling
            if (calcState.waitingForSecondOperand) {
                calcState.displayValue = keyContent;
                calcState.waitingForSecondOperand = false;
            } else {
                calcState.displayValue = calcState.displayValue === '0'? keyContent : calcState.displayValue + keyContent;
            }
        } else if (action === 'decimal') {
            if (!calcState.displayValue.includes('.')) {
                calcState.displayValue += '.';
            }
        } else if (['add', 'subtract', 'multiply', 'divide'].includes(action)) {
            handleOperator(action);
        } else if (action === 'calculate') {
            if (calcState.operator && calcState.firstOperand!== null) {
                const secondOperand = parseFloat(calcState.displayValue);
                calcState.displayValue = String(calculateResult(calcState.firstOperand, secondOperand, calcState.operator));
                calcState.firstOperand = null;
                calcState.operator = null;
                calcState.waitingForSecondOperand = false;
            }
        } else if (action === 'clear') {
            calcState.displayValue = '0';
            calcState.firstOperand = null;
            calcState.operator = null;
            calcState.waitingForSecondOperand = false;
        }
        updateCalcDisplay();
    });

    function handleOperator(nextOperator) {
        const inputValue = parseFloat(calcState.displayValue);
        
        if (calcState.operator && calcState.waitingForSecondOperand) {
            calcState.operator = nextOperator;
            return;
        }
        if (calcState.firstOperand == null &&!isNaN(inputValue)) {
            calcState.firstOperand = inputValue;
        } else if (calcState.operator) {
            const result = calculateResult(calcState.firstOperand, inputValue, calcState.operator);
            calcState.displayValue = String(result);
            calcState.firstOperand = result;
        }
        calcState.waitingForSecondOperand = true;
        calcState.operator = nextOperator;
    }

    function calculateResult(first, second, operator) {
        if (operator === 'add') return first + second;
        if (operator === 'subtract') return first - second;
        if (operator === 'multiply') return first * second;
        if (operator === 'divide') return first / second;
        return second;
    }
</script>
</body>
</html>
