<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivadut's Integrated Financial Ledger</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg-color: #e0e3eb;
            --panel-bg: #ffffff;
            --text-main: #000e1a;
            --text-muted: #6c7a89;
            --border-light: #cccccc;
            --btn-give: #ff5722;
            --btn-receive: #8bc34a;
            --btn-neutral: #03a9f4;
            --btn-whatsapp: #25D366; 
            --calc-bg: #2c3e50;
            --calc-key: #eee;
            --calc-key-op: #ff9800;
            --calc-key-action: #e74c3c;
            --timeline-spine: #d2d7d3;
            --timeline-node-bg: #ffffff;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Poppins', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; }

        .app-page { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; }
        #login-page { display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); }

        .login-card { background: var(--panel-bg); padding: 40px 30px; border-radius: 15px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        .login-form-group { margin-bottom: 20px; text-align: left; }
        .login-form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        .login-form-group input { width: 100%; padding: 12px 15px; border: 1px solid var(--border-light); border-radius: 8px; font-size: 1rem; }
        .btn-login { width: 100%; padding: 14px; background-color: var(--btn-neutral); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .login-error { color: #e74c3c; font-size: 0.85rem; margin-top: 15px; font-weight: 600; }

        .menu-header { width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg); padding: 20px 30px; border-radius: 15px; margin-bottom: 30px; margin-top: 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 900px; }
        .menu-box { background: var(--panel-bg); border-radius: 20px; padding: 35px 20px; text-align: center; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.04); transition: all 0.4s; display: flex; flex-direction: column; align-items: center; gap: 12px; position: relative; border: 1px solid #f0f0f0; }
        .menu-box:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .icon-wrapper { width: 75px; height: 75px; display: flex; justify-content: center; align-items: center; border-radius: 50%; font-size: 2.2rem; margin-bottom: 5px; box-shadow: 0 6px 12px rgba(0,0,0,0.08); }
        
        .box-debit::before { background: linear-gradient(90deg, #4facfe, #00f2fe); content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; }
        .box-calendar::before { background: linear-gradient(90deg, #b224ef, #7579ff); content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; }
        .box-cohort::before { background: linear-gradient(90deg, #11998e, #38ef7d); content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; }
        .box-savings::before { background: linear-gradient(90deg, #f6d365, #fda085); content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; }
        .box-calc::before { background: linear-gradient(90deg, #ff0844, #ffb199); content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; }

        .tool-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 25px; }
        .tool-nav-bar { width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back, .btn-logout { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; color: white; }
        .btn-back { background-color: var(--text-main); }
        .btn-logout { background-color: var(--calc-key-action); }

        .panel { background: var(--panel-bg); border-radius: 15px; padding: 25px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); width: 100%; }
        .debit-display { font-size: 2.5rem; font-weight: bold; color: var(--btn-give); margin: 20px 0; text-align: center; background-color: #fff3e0; border-radius: 8px; padding: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .input-row { display: flex; gap: 10px; width: 100%; }
        input[type="number"], input[type="text"], input[type="password"], select { padding: 12px; border: 1px solid var(--border-light); border-radius: 8px; font-size: 1rem; }
        .btn-add { background-color: var(--btn-neutral); flex: 1 1 auto; padding: 12px; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-reset { background-color: var(--calc-key-action); color: white; border: none; border-radius: 8px; padding: 12px; cursor: pointer; }
        .debit-history-scroll { background-color: #f4f6f8; border-radius: 8px; max-height: 400px; overflow-y: auto; padding: 15px 20px; }
        
        .savings-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .savings-table th, .savings-table td { padding: 15px; text-align: center; border-bottom: 1px solid var(--border-light); }
        .grand-total { font-size: 1.4rem; font-weight: bold; color: #2e7d32; }

        .ledger-item-container { display: flex; flex-direction: column; border-bottom: 1px solid var(--border-light); padding: 18px 0; }
        .ledger-row { display: grid; grid-template-columns: 120px 2fr 1fr; align-items: center; gap: 15px; }
        .btn-give { background-color: var(--btn-give); padding: 8px; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .btn-receive { background-color: var(--btn-receive); padding: 8px; color: white; border: none; border-radius: 6px; cursor: pointer; }

        .calculator { background-color: var(--calc-bg); border-radius: 15px; padding: 20px; max-width: 450px; margin: 0 auto; width: 100%; }
        .calculator__display { background-color: #ffeb3b; color: var(--text-main); font-size: 2.2rem; text-align: right; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .calculator__keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .calculator__keys button { background-color: var(--calc-key); padding: 18px 0; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .calendar-cell { background: #f8f9fa; border: 1px solid var(--border-light); border-radius: 8px; min-height: 80px; padding: 8px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: var(--panel-bg); width: 90%; max-width: 500px; border-radius: 15px; padding: 25px; }
    </style>
</head>
<body>

    <div id="login-page" class="app-page" style="display: flex;">
        <div class="login-card">
            <h1>Shivadut's Secure Ledger</h1>
            <p>Access your financial dashboard.</p>
            <div class="login-form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Numeric username">
            </div>
            <div class="login-form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Numeric password">
            </div>
            <button class="btn-login" onclick="attemptLogin()">Access Ledger</button>
            <div class="login-error" id="login-error-msg"></div>
        </div>
    </div>

    <div id="menu-page" class="app-page">
        <div class="menu-header">
            <h1>Welcome, Shivadut!</h1>
            <button class="btn-logout" onclick="logout()">Sign Out</button>
        </div>
        <div class="menu-grid">
            <div class="menu-box box-debit" onclick="openPage('debit-page')">
                <div class="icon-wrapper">🧾</div>
                <h3>Daily Debit</h3>
            </div>
            <div class="menu-box box-calendar" onclick="openPage('calendar-page')">
                <div class="icon-wrapper">📅</div>
                <h3>Calendar</h3>
            </div>
            <div class="menu-box box-cohort" onclick="openPage('cohort-page')">
                <div class="icon-wrapper">🤝</div>
                <h3>Cohort Ledger</h3>
            </div>
            <div class="menu-box box-savings" onclick="openPage('savings-page')">
                <div class="icon-wrapper">🏦</div>
                <h3>Cash Counter</h3>
            </div>
            <div class="menu-box box-calc" onclick="openPage('calculator-page')">
                <div class="icon-wrapper">🧮</div>
                <h3>Calculator</h3>
            </div>
        </div>
    </div>

    <div id="savings-page" class="app-page">
        <div class="tool-nav-bar"><button class="btn-back" onclick="openPage('menu-page')">⬅ Back</button></div>
        <div class="tool-container">
            <div class="panel">
                <h2>Savings Cash Counter</h2>
                <table class="savings-table">
                    <thead><tr><th>Denom</th><th>Count</th><th>Total</th></tr></thead>
                    <tbody id="savings-body">
                        <tr><td>500</td><td><input type="number" class="note-input" data-denom="500" oninput="calculateSavings()"></td><td id="row-total-500">0</td></tr>
                        <tr><td>100</td><td><input type="number" class="note-input" data-denom="100" oninput="calculateSavings()"></td><td id="row-total-100">0</td></tr>
                    </tbody>
                    <tfoot><tr><th colspan="2">Total</th><th class="grand-total" id="savings-grand-total">₹0</th></tr></tfoot>
                </table>
            </div>
        </div>
    </div>

    <div id="debit-page" class="app-page">
        <div class="tool-nav-bar"><button class="btn-back" onclick="openPage('menu-page')">⬅ Back</button></div>
        <div class="tool-container">
            <div class="panel">
                <h2>Daily Debit</h2>
                <div class="debit-display">₹<span id="total-debit-val">0.00</span></div>
                <input type="number" id="daily-debit-input" placeholder="Amount">
                <button class="btn-add" onclick="addDailyDebit()">Add</button>
                <div class="debit-history-scroll" id="debit-history-list"></div>
            </div>
        </div>
    </div>

    <div id="calendar-page" class="app-page">...</div>
    <div id="cohort-page" class="app-page">...</div>
    <div id="calculator-page" class="app-page">...</div>

    <script>
        function openPage(pageId) {
            document.querySelectorAll('.app-page').forEach(page => page.style.display = 'none');
            document.getElementById(pageId).style.display = 'flex';
        }

        function attemptLogin() {
            if (document.getElementById('password').value === '857447') openPage('menu-page');
            else document.getElementById('login-error-msg').textContent = 'Invalid Password';
        }

        function logout() { openPage('login-page'); }

        function calculateSavings() {
            let total = 0;
            document.querySelectorAll('.note-input').forEach(i => {
                let val = parseInt(i.value) || 0;
                let denom = parseInt(i.getAttribute('data-denom'));
                total += val * denom;
            });
            document.getElementById('savings-grand-total').textContent = '₹' + total;
        }

        function addDailyDebit() {
            let val = parseFloat(document.getElementById('daily-debit-input').value) || 0;
            let current = parseFloat(document.getElementById('total-debit-val').textContent);
            document.getElementById('total-debit-val').textContent = (current + val).toFixed(2);
        }
    </script>
</body>
</html>
