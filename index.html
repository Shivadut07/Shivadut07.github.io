            return `Hey ${peer}, just a quick reminder that your pending share is ₹${balance.toFixed(2)} on the dashboard. Let's settle up when you can!`;
        } else if (balance < 0) {
            return `Hey ${peer}, just a heads up that I currently owe you ₹${Math.abs(balance).toFixed(2)}. I'll be sending this over to you shortly.`;
        } else {
            return `Hey ${peer}, looks like our financial ledger is completely settled up at ₹0.00!`;
        }
    }

    // --- Core Rendering Pipeline: Matrix, Timelines, and Communication Routing ---
    function renderLedger() {
        const container = document.getElementById('ledger-container');
        container.innerHTML = ''; 

        sortedFriends.forEach(peer => {
            const peerData = ledgerState[peer];
            const currentBalance = peerData.balance;
            const currentBaseline = peerData.baseline;
            const transactions = peerData.transactions;
            
            // Linguistic UI Parsing mapping mathematical balance values to semantic UI classes
            let balanceText = 'Settled (₹0)';
            let balanceClass = 'balance-neutral';
            if (currentBalance > 0) {
                balanceText = `Avunga kudukanum ₹${currentBalance.toFixed(2)}`;
                balanceClass = 'balance-positive';
            } else if (currentBalance < 0) {
                balanceText = `Naan Kudukanum ₹${Math.abs(currentBalance).toFixed(2)}`;
                balanceClass = 'balance-negative';
            }

            // Universal Link Cryptographic Encoding
            const rawMessage = generateSharePayload(peer, currentBalance);
            const encodedPayload = encodeURIComponent(rawMessage);
            const whatsappUri = `https://wa.me/?text=${encodedPayload}`;

            // Relative Progress Mathematical Calculation preventing unhandled zero-division errors
            let progress = 0;
            if (currentBalance === 0) {
                progress = 100;
            } else if (currentBaseline > 0) {
                progress = ((currentBaseline - Math.abs(currentBalance)) / currentBaseline) * 100;
            }
            progress = Math.max(0, Math.min(progress, 100));
            const roundedProgress = Math.round(progress);

            // Progress Visualization DOM Generation applying state-dependent CSS modifiers
            const isSettled = roundedProgress === 100 && currentBalance === 0;
            const fillClass = isSettled ? 'progress-fill settled' : 'progress-fill';
            
            const progressHTML = `
                <div class="progress-module">
                    <div class="progress-container" 
                         role="progressbar" 
                         aria-valuenow="${roundedProgress}" 
                         aria-valuemin="0" 
                         aria-valuemax="100" 
                         aria-label="Settlement progress for ${peer}">
                        <div class="${fillClass}" style="transform: scaleX(${progress / 100});"></div>
                    </div>
                    <div class="progress-label-text">${roundedProgress}% Settled</div>
                </div>
            `;

            // Action Container Injecting the highly optimized inline SVG trigger securely
            const actionContainerHTML = `
                <div class="action-container">
                    <div class="balance-display ${balanceClass}">${balanceText}</div>
                    <a href="${whatsappUri}" target="_blank" rel="noopener noreferrer" class="btn-share-wa" aria-label="Send reminder to ${peer} via WhatsApp" title="Send WhatsApp Message">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
                            <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
                        </svg>
                    </a>
                </div>
            `;

            // Relational Timeline DOM Generation parsing historical array structures
            let historyHTML = '';
            if (transactions.length === 0) {
                historyHTML = `<p class="no-history-msg">No historical transactions available.</p>`;
            } else {
                let listItems = transactions.map(txn => {
                    const dateObj = new Date(txn.timestamp);
                    const formattedDate = dateFormatter.format(dateObj);
                    
                    const actionLabel = txn.action === 'give' ? 'Naa Kuduthen' : 'Avunga Kuduthanga';
                    const symbol = txn.action === 'give' ? '+' : '-';
                    
                    return `
                        <li class="timeline-item ${txn.action}">
                            <div class="timeline-meta">
                                <span class="timeline-desc">${actionLabel}</span>
                                <span class="timeline-date">${formattedDate}</span>
                            </div>
                            <div class="timeline-amount">${symbol}₹${txn.amount.toFixed(2)}</div>
                        </li>
                    `;
                }).join('');
                historyHTML = `<ul class="timeline">${listItems}</ul>`;
            }

            // Root node architectural synthesis
            const itemContainer = document.createElement('div');
            itemContainer.className = 'ledger-item-container';
            itemContainer.innerHTML = `
                <div class="ledger-row">
                    <div class="peer-info">
                        <div class="peer-name">${peer}</div>
                        <button class="btn-history-toggle" onclick="toggleHistory('${peer}')">
                            View Timeline
                        </button>
                    </div>
                    
                    <div class="ledger-controls">
                        <input type="number" id="input-${peer}" placeholder="Amount" step="0.01" min="0">
                        <button class="btn-give" onclick="processTransaction('${peer}', 'give')">Naa kuduthen</button>
                        <button class="btn-receive" onclick="processTransaction('${peer}', 'receive')">Avunga kuduthanga</button>
                    </div>
                    <div style="display:flex; flex-direction:column; justify-content:center; width:100%;">
                        ${actionContainerHTML}
                        ${progressHTML}
                    </div>
                </div>
                
                <div class="history-panel" id="history-${peer}">
                    <h4>Transaction Timeline</h4>
                    ${historyHTML}
                </div>
            `;
            container.appendChild(itemContainer);
        });
    }

    function toggleHistory(peer) {
        const panel = document.getElementById(`history-${peer}`);
        if (panel.style.display === 'block') {
            panel.style.display = 'none';
        } else {
            panel.style.display = 'block';
        }
    }

    // --- Relational Financial Mutation Engine defining state transitions ---
    function processTransaction(peer, action) {
        const inputEl = document.getElementById(`input-${peer}`);
        const amount = parseFloat(inputEl.value);
        
        if (!isNaN(amount) && amount > 0) {
            const newTransaction = {
                id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
                amount: amount,
                action: action,
                timestamp: new Date().toISOString()
            };

            let prev_balance = ledgerState[peer].balance;
            let prev_baseline = ledgerState[peer].baseline;
            let new_balance = prev_balance;
            let new_baseline = prev_baseline;

            if (action === 'give') {
                new_balance = prev_balance + amount;
                if (prev_balance >= 0) {
                    new_baseline = prev_baseline + amount;
                } else {
                    new_baseline = (new_balance > 0) ? new_balance : prev_baseline;
                }
            } else if (action === 'receive') {
                new_balance = prev_balance - amount;
                if (prev_balance <= 0) {
                    new_baseline = prev_baseline + amount; 
                } else {
                    new_baseline = (new_balance < 0) ? Math.abs(new_balance) : prev_baseline;
                }
            }
            
            if (new_balance === 0) new_baseline = 0;

            ledgerState[peer].balance = new_balance;
            ledgerState[peer].baseline = new_baseline;
            ledgerState[peer].transactions.unshift(newTransaction);
            
            inputEl.value = '';
            localStorage.setItem('ledgerState', JSON.stringify(ledgerState));
            
            renderLedger(); 
            // Re-open history panel to visualize the newly mutated relational state
            document.getElementById(`history-${peer}`).style.display = 'block';
        }
    }

    // --- Isolated Event Delegation routing logic for the Calculator Module ---
    const calcKeys = document.getElementById('calc-keys');
    const calcDisplay = document.getElementById('calc-display');
    let calcState = {
        firstOperand: null,
        operator: null,
        waitingForSecondOperand: false,
        displayValue: '0'
    };

    function updateCalcDisplay() {
        calcDisplay.textContent = calcState.displayValue;
    }

    // Interception of event bubbling phase
    calcKeys.addEventListener('click', (event) => {
        const target = event.target;
        if (!target.matches('button')) return;

        const action = target.dataset.action;
        const keyContent = target.textContent;

        if (!action) {
            if (calcState.waitingForSecondOperand) {
                calcState.displayValue = keyContent; 
                calcState.waitingForSecondOperand = false;
            } else {
                calcState.displayValue = calcState.displayValue === '0' ? keyContent : calcState.displayValue + keyContent;
            }
        } else if (action === 'decimal') {
            if (!calcState.displayValue.includes('.')) {
                calcState.displayValue += '.';
            }
        } else if (['add', 'subtract', 'multiply', 'divide'].includes(action)) {
            handleOperator(action);
        } else if (action === 'calculate') {
            if (calcState.operator && calcState.firstOperand !== null) {
                const secondOperand = parseFloat(calcState.displayValue);
                calcState.displayValue = String(calculateResult(calcState.firstOperand, secondOperand, calcState.operator));
                calcState.firstOperand = null;
                calcState.operator = null;
                calcState.waitingForSecondOperand = false;
            }
        } else if (action === 'clear') {
            calcState.displayValue = '0';
            calcState.firstOperand = null;
            calcState.operator = null;
            calcState.waitingForSecondOperand = false;
        }
        updateCalcDisplay();
    });

    function handleOperator(nextOperator) {
        const inputValue = parseFloat(calcState.displayValue);
        
        if (calcState.operator && calcState.waitingForSecondOperand) {
            calcState.operator = nextOperator;
            return;
        }
        if (calcState.firstOperand == null && !isNaN(inputValue)) {
            calcState.firstOperand = inputValue;
        } else if (calcState.operator) {
            const result = calculateResult(calcState.firstOperand, inputValue, calcState.operator);
            calcState.displayValue = String(result);
            calcState.firstOperand = result;
        }
        calcState.waitingForSecondOperand = true;
        calcState.operator = nextOperator;
    }

    function calculateResult(first, second, operator) {
        if (operator === 'add') return first + second;
        if (operator === 'subtract') return first - second;
        if (operator === 'multiply') return first * second;
        if (operator === 'divide') return first / second;
        return second;
    }
</script>
